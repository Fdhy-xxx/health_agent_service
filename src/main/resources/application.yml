
server:
  port: 8080

spring:
  application:
    name: motion-agent-cloud

  # 🌐 数据库连接配置
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/db_motion_agent?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

# 💾 MyBatis-Plus 框架配置
mybatis-plus:
  configuration:
    # 开启驼峰命名自动映射（如数据库字段 create_time 映射为 Java 的 createTime）
    map-underscore-to-camel-case: true
    # 控制台打印 SQL 语句，方便你这两天调试看效果
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 全局主键策略：自增
      id-type: auto

# 🚀 自定义 AI 微服务配置（防腐层解耦核心）
ai-service:
  #指向你 FastAPI 的 health-plan 路由地址
  url: http://127.0.0.1:8000/api/health-plan